# Environnement de production
# Usage : docker compose -f docker-compose.prod.yml up -d
#
# Prérequis : copier .env.example → .env et renseigner toutes les variables.
# Les images sont tirées de ghcr.io lors d'une release GitHub.

services:

  db:
    image: postgres:16-alpine
    restart: always
    networks:
      - lachouine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/mrmeganova/la-chouine.com/backend:${TAG:-latest}
    restart: always
    networks:
      - lachouine
    environment:
      NODE_ENV:       production
      PORT:           "3000"
      DATABASE_URL:   postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET:     ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SMTP_HOST:      ${SMTP_HOST}
      SMTP_PORT:      ${SMTP_PORT:-587}
      SMTP_SECURE:    ${SMTP_SECURE:-false}
      SMTP_USER:      ${SMTP_USER}
      SMTP_PASS:      ${SMTP_PASS}
      SMTP_FROM:      ${SMTP_FROM}
      FRONTEND_URL:   ${FRONTEND_URL}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/mrmeganova/la-chouine.com/frontend:${TAG:-latest}
    restart: always
    networks:
      - lachouine
      - traefik
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.www-la-chouine-com.middlewares=redirect-non-www-to-www
      - traefik.http.routers.www-la-chouine-com.rule=Host(`www.la-chouine.com`) || Host(`la-chouine.com`)
      - traefik.http.services.www-la-chouine-com.loadbalancer.server.port=80

volumes:
  postgres_prod_data:

networks:
  traefik:
    name: traefik
    external: true
