server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vraie IP client derrière Traefik (#144). nginx n'est joignable que par
    # Traefik (port 80 non publié, uniquement sur le réseau Docker) : on fait
    # confiance aux plages privées et on lit X-Forwarded-For posé par Traefik.
    # $remote_addr (donc l'access log) et X-Forwarded-For transmis au backend
    # reflètent alors le client réel, pas l'IP du réseau Docker.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Masque la version de nginx dans les réponses/erreurs.
    server_tokens off;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # SPA — toutes les routes non-fichier → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API vers le backend
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # WebSocket PvP (matchmaking + parties en ligne) — en-têtes d'upgrade requis.
    location /ws {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;  # connexions longues (partie en cours)
    }

    # Cache long terme pour les assets avec hash Vite
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Pas de cache pour index.html (déploiements fréquents)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
