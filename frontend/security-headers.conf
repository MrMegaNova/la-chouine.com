# En-têtes de sécurité du SPA (#118). Inclus dans le bloc server ET dans chaque
# location qui possède son propre `add_header` (sinon nginx remplace, ne fusionne
# pas, et les en-têtes du niveau server seraient perdus).
#
# CSP : le build Vite n'émet que des scripts/CSS externes hashés (script-src
# 'self'). 'unsafe-inline' n'est gardé que pour les STYLES (attributs `style=`
# de React) — à retirer après migration des styles inline. connect-src autorise
# l'API et le WebSocket même origine (ws:/wss:).
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), browsing-topics=()" always;
