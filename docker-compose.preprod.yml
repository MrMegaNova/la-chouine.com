# Environnement de production
# Usage : docker compose -f docker-compose.prod.yml up -d
#
# Prérequis : copier .env.example → .env et renseigner toutes les variables.
# Les images sont tirées de ghcr.io lors d'une release GitHub.

services:

  preprod-db:
    image: postgres:18-alpine
    restart: always
    networks:
      - lachouine-preprod
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
      PGDATA:            /var/lib/postgresql/data
    volumes:
      - postgres_preprod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  preprod-backend:
    image: backend:preprod
    build: backend/.
    restart: always
    networks:
      - lachouine-preprod
    environment:
      NODE_ENV:       production
      PORT:           "3000"
      # Traefik + nginx = 2 proxies devant le backend (#144) → vraie IP client.
      TRUST_PROXY:    "2"
      PGHOST:         preprod-db
      PGPORT:         "5432"
      PGUSER:         ${POSTGRES_USER}
      PGPASSWORD:     ${POSTGRES_PASSWORD}
      PGDATABASE:     ${POSTGRES_DB}
      PGSSLMODE:      disable
      JWT_SECRET:     ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SMTP_HOST:      ${SMTP_HOST}
      SMTP_PORT:      ${SMTP_PORT:-587}
      SMTP_SECURE:    ${SMTP_SECURE:-false}
      SMTP_USER:      ${SMTP_USER}
      SMTP_PASS:      ${SMTP_PASS}
      SMTP_FROM:      ${SMTP_FROM}
      FRONTEND_URL:   ${FRONTEND_URL}
    depends_on:
      preprod-db:
        condition: service_healthy

  preprod-frontend:
    image: frontend:preprod
    build: frontend/.
    restart: always
    networks:
      - lachouine-preprod
      - traefik
    depends_on:
      - preprod-backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.preprod-la-chouine-com.rule=Host(`preprod.la-chouine.com`)
      - traefik.http.services.preprod-la-chouine-com.loadbalancer.server.port=80

volumes:
  postgres_preprod_data:

networks:
  lachouine-preprod:
    name: lachouine-preprod
  traefik:
    name: traefik
    external: true
